<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário v-model</title>

</head>

<body>

    <div id="app" class="container">
        <h2>Formulário Básico</h2>

        <form @submit.prevent="enviarFormulario">

            <div class="form-group">
                <label>Nome</label>
                <input type="text" v-model="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" v-model="email" placeholder="Digite seu e-mail" required>
            </div>

            <button type="submit">Enviar</button>
        </form>

        <div class="resultado">
            <h3>Dados do Formulário</h3>
            <p><strong>Nome:</strong> {{ nome }}</p>
            <p><strong>Email:</strong> {{ email }}</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>

    <script>
        var app = new Vue({
            el: '#app',
            data: {
                nome: '',
                email: ''
            },
            methods: {
                enviarFormulario() {
                    /* Ação disparada ao clicar no botão Enviar */
                    alert(`Dados enviados com sucesso!\n\nNome: ${this.nome}\nE-mail: ${this.email}`);

                    /* Opcional: Limpar os campos após o envio */
                    this.nome = '';
                    this.email = '';
                }
            }
        });
    </script>
</body>

</html>
