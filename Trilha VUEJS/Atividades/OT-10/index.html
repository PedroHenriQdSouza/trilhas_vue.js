<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Curso Vue js - Components</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div id="app">
        <h1>{{ Título}}</h1>
        <menu-bar></menu-bar>
        <menu-bar></menu-bar>
        <menu-bar></menu-bar><!-- utilização do mesmo componente  3 vezes-->
    </div>

    <template id="menu"><!-- criação do componente -->
        <ul>
            <li>Item 1</li>
            <li>Item 2</li>
            <li>Item 3</li>
        </ul>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <script>
        Vue.component('menu-bar', {/* nome do componente */
            template: '#menu'/* chamada do id do componente criado */
        });
        var app = new Vue({
            el: '#app',
            data: {
                Título: 'Vue js' /* titulo com interpolação de varáveis */
            }
        });
        </script>
</body>
</html>
