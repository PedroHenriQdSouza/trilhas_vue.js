<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documento</title>
</head>

<body>

    <div id="app">
        <h1>{{ usuario.nome | capitalize }}</h1><!-- filtros servem para formatar e alterar dados antes de exibi-los -->
        <p>{{ usuario.bio | truncate(20) }}</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>

    <script>
        new Vue({
            el: '#app',
            data: {
                usuario: {
                    nome: 'joão silva',
                    bio: 'João é um desenvolvedor apaixonado por tecnologias de frontend e backend, com ampla experiência.'
                }
            },
            filters: { /* filtro local que transforma a primeira letra de um valor em maiúscula */
                capitalize(valor) {
                    if (!valor) return '';
                    valor = valor.toString();
                    return valor.charAt(0).toUpperCase() + valor.slice(1);
                },

                truncate(valor, limite) {/* filtro com parâmetros são filtros que determinam seu comportamento com base nos parâmetros enviados*/
                    if (!valor) return '';
                    valor = valor.toString();

                    return valor.length > limite
                        ? valor.substring(0, limite) + '...'
                        : valor;
                }
            }
        });
    </script>

</body>

</html>
