<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo form 02 com prevenção de comportamento</title>
</head>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
    </style>

<body>
    <div id="app">
        <form @submit.prevent="enviarFormulario">
            <!-- prevent serve para impedir o funcionamento padrão de alguma função, por exemplo um botão de submit que deveria enviar o fomulário não vai funcionar -->
            <!-- nesse caso o prevent evitará que a pagina seja recarregada. -->
            <input type="text" v-model="nome">
            <button type="submit">Enviar</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script>
        new Vue({
            el: '#app',
            data: {
                nome: ''
            },
            methods: {
                enviarFormulario() {
                    alert('Formulário enviado com o nome: ' + this.nome);
                }
            }
        });
    </script>
</body>

</html>
