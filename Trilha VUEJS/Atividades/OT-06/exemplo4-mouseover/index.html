<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue js diretiva v-bind, atribuindo valor em class e style</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div id="app">

        <h2 @mouseover="mostrarMensagem"><!-- semelhante ao hover em css -->
            Passe o mouse aqui
        </h2>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

    <script>

        new Vue({

            el: "#app",

            methods: {

                mostrarMensagem() {

                    alert("Mouse sobre o texto!");

                }

            }

        });

    </script>
</body>

</html>
