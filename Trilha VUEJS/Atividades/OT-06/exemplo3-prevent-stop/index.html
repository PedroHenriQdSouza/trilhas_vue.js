<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue js diretiva v-bind, atribuindo valor em class e style</title>
        <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
    </style>
</head>

<body>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <div id="app">
        <h1>{{ titulo }}</h1>
        <form action="https://www.google.com">
            <button type="submit" class="btn btn-primary" v-on:click.prevent.stop="enviar()">Enviar</button>
            <!-- .stop impede que o evento de clique se propague para elementos pais (como o formulário, uma div ou o body). Nesse caso, apenas o método enviar() do botão será executado. -->
            <!-- se o stop fosse removido e tivesse outro elemento acima com um evento de clique, ele seria executado. -->
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <script>
        var app = new Vue({
            el: '#app',
            data: {
                titulo: 'Vue JS',
            },
            methods: {
                enviar() {
                    alert('Enviando!');
                }
            }
        });
    </script>
</body>

</html>
