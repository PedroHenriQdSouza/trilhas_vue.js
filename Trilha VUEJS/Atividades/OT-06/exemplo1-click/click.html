<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo Contagem</title>

    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
    </style>
</head>

<body>

    <div id="app">
        <button @click="incrementarContador"> <!-- @ é abreviação de v-on -->
            Clique aqui {{ contador }} vezes
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

    <script>
        new Vue({
            el: '#app',

            data: {
                contador: 0
            },

            methods: {
                incrementarContador() {
                    this.contador++;
                }
            }
        });
    </script>

</body>

</html>
