<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>


    <div id="app">

        <input type="text" @keyup="capturarTecla"><!-- detecta se alguma tecla foi pressionada. -->

    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

    <script>

        new Vue({

            el: "#app",

            methods: {

                capturarTecla(event) {

                    alert("Tecla pressionada: " + event.key);

                }

            }

        });

    </script>
</body>

</html>
