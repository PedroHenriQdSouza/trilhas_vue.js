<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    .button {
        width: 100vw;
        height: 100vh;
    }
</style>

<body>
    <div id="app">

        <button @click="mostrarPosicao($event)" class="button">
            Clique aqui
        </button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script>

        new Vue({

            el: "#app",

            methods: {

                mostrarPosicao(event) {

                    alert(
                        "X: " + event.clientX +
                        "\nY: " + event.clientY
                    );

                }

            }

        });

    </script>
</body>

</html>
