    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Vue JS - Login com Diretivas</title>

</head>
<body>

    <div id="app" class="container">
        <h2>{{ titulo }}</h2>

        <div v-if="autenticado">
            <h3>Bem-vindo(a), {{ usuario }}!</h3>
            <p>Você acessou o painel com sucesso.</p>
            <button class="btn-sair" @click="logout">Sair</button>
        </div>

        <div v-else>
            <form @submit.prevent="login">
                <input type="text" v-model="username" placeholder="Nome de usuário" required>
                <input type="password" v-model="password" placeholder="Senha" required>
                
                <button type="submit" class="btn-entrar">Entrar</button>
                
                <button type="button" class="btn-limpar" @click="resetForm">Limpar</button>
            </form>

            <p v-show="erro" class="erro">Usuário ou senha incorretos!</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>

    <script>
        var app = new Vue({
            el: '#app',
            data: {
                titulo: 'Acesso ao Sistema',
                autenticado: false,
                usuario: '',
                username: '',
                password: '',
                erro: false
            },
            methods: {
                login() {
                    // Simulando uma verificação no banco de dados
                    if (this.username === 'admin' && this.password === '1234') {
                        this.autenticado = true;
                        this.usuario = this.username;
                        this.erro = false; // Tira a mensagem de erro, caso estivesse ativa
                    } else {
                        this.erro = true; // Ativa a mensagem de erro via v-show
                    }
                },
                logout() {
                    this.autenticado = false;
                    this.usuario = '';
                    this.resetForm(); // Limpa os dados ao sair
                },
                // Função adicionada para cumprir a Tarefa 4 dos alunos
                resetForm() {
                    this.username = '';
                    this.password = '';
                    this.erro = false;
                }
            }
        });
    </script>
</body>
</html>
