<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Vue.js - Saudação com v-bind</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #41B883;
            /* Verde padrão do Vue.js */
            margin-bottom: 20px;
            cursor: help; /* Muda o cursor para indicar que há uma dica */
        }

        input {
            width: 80%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 5px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #41B883;
        }
    </style>
</head>

<body>

    <div id="app" class="container">
        <h1 v-bind:title="dicaTitulo">{{ greeting }}, {{ nome }}!!</h1>

        <input type="text" v-model="nome" v-bind:placeholder="dicaInput">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>

    <script>
        var app = new Vue({
            el: '#app',
            data: {
                greeting: 'Olá',
                nome: 'Pedro', // Valor inicial sugerido na atividade
                
                // Novas variáveis criadas para serem usadas com o v-bind
                dicaTitulo: 'Passe o mouse aqui para ver esta mensagem dinâmica do Vue!',
                dicaInput: 'Por favor, digite o seu nome'
            }
        });
    </script>

</body>

</html>
